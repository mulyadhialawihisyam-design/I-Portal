<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muly@-Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Exo+2:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   BASE RESET & VARIABLES
══════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --sb-w:68px;
  --menu-w:248px;
  --menu-collapsed-w:62px;
  --sidebar-bg:#1a0a2e;
  --sidebar-border:rgba(167,139,250,0.12);
  --menu-bg:#10082a;
  --content-bg:#07050f;
  --accent-cyan:#38bdf8;
  --accent-purple:#a78bfa;
  --accent-indigo:#6366f1;
  --accent-green:#34d399;
  --text-hi:rgba(255,255,255,0.93);
  --text-mid:rgba(255,255,255,0.52);
  --text-lo:rgba(255,255,255,0.2);
  --sep:rgba(255,255,255,0.06);
  --collapse-transition:0.35s ease;
}

html,body{width:100%;height:100%;overflow:hidden;background:#07050f;font-family:'Exo 2',sans-serif;color:var(--text-hi);user-select:none}

/* ══════════════════════════════════════
   UI — SHELL
══════════════════════════════════════ */
#shell{position:fixed;inset:0;display:flex;z-index:2}

/* ══════════════════════════════════════
   UI — SIDEBAR
══════════════════════════════════════ */
#sidebar{
  width:var(--sb-w);height:100%;flex-shrink:0;
  background:linear-gradient(180deg,#1e0b38 0%,#140826 50%,#1a0b34 100%);
  border-right:1px solid rgba(139,92,246,0.18);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;z-index:20;
  display:none;
  box-shadow:4px 0 24px rgba(88,28,220,0.18);
}
#sidebar.visible{display:flex}

#sidebar::before{
  content:'';position:absolute;right:0;top:15%;height:70%;width:1px;
  background:linear-gradient(to bottom,transparent,rgba(139,92,246,0.35) 30%,rgba(139,92,246,0.35) 70%,transparent);
}
#sidebar::after{
  content:'';position:absolute;top:0;left:0;right:0;height:140px;
  background:radial-gradient(ellipse 80% 100% at 50% 0%,rgba(139,92,246,0.2) 0%,transparent 70%);
  pointer-events:none;
}

/* ── home btn in sidebar ── */
#home-btn{
  width:46px;height:46px;border-radius:50%;
  background:radial-gradient(circle at 38% 32%,rgba(167,139,250,0.22) 0%,rgba(20,8,38,0.95) 65%);
  border:1.5px solid rgba(139,92,246,0.35);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;position:relative;z-index:1;
  box-shadow:0 4px 20px rgba(0,0,0,0.55),inset 0 1px 0 rgba(255,255,255,0.06);
  transition:box-shadow 250ms ease,border-color 250ms ease,transform 140ms ease,background 250ms ease;
}
#home-btn:hover{
  border-color:rgba(167,139,250,0.6);
  box-shadow:0 0 18px rgba(139,92,246,0.3),0 4px 20px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.07);
}
#home-btn.lit{
  border-color:rgba(167,139,250,0.8);
  background:radial-gradient(circle at 38% 32%,rgba(167,139,250,0.35) 0%,rgba(20,8,38,0.88) 65%);
  box-shadow:0 0 0 2.5px rgba(139,92,246,0.5),0 0 30px rgba(139,92,246,0.45),0 0 65px rgba(139,92,246,0.15),0 4px 20px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.1);
  animation:pulse-p 2.8s ease-in-out infinite;
}
#home-btn.pressed{transform:scale(0.87)!important;animation:none!important;
  border-color:rgba(167,139,250,0.9);
  box-shadow:0 0 0 3px rgba(139,92,246,0.55),0 0 40px rgba(139,92,246,0.5),inset 0 1px 0 rgba(255,255,255,0.12);
}
#home-icon{width:24px;height:24px;transition:filter 250ms ease}
#home-btn.lit #home-icon{filter:drop-shadow(0 0 6px rgba(167,139,250,0.9))}

@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes pulse-p{
  0%,100%{box-shadow:0 0 0 2.5px rgba(139,92,246,0.5),0 0 30px rgba(139,92,246,0.45),0 0 65px rgba(139,92,246,0.15),0 4px 20px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.1)}
  50%{box-shadow:0 0 0 5px rgba(139,92,246,0.28),0 0 50px rgba(139,92,246,0.55),0 0 100px rgba(139,92,246,0.2),0 4px 20px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.1)}
}

/* ══════════════════════════════════════
   SIDEBAR UI — MENU PANEL (expanded + collapsed)
══════════════════════════════════════ */
#menu-panel{
  width:var(--menu-w);height:100%;flex-shrink:0;
  background:linear-gradient(180deg,#120830 0%,#0e0625 60%,#110830 100%);
  border-right:1px solid rgba(139,92,246,0.1);
  display:flex;flex-direction:column;
  display:none;
  position:relative;z-index:19;
  box-shadow:4px 0 20px rgba(0,0,0,0.35);
  transition:width var(--collapse-transition);
  overflow:hidden;
}
#menu-panel.visible{display:flex}

/* ══════════════════════════════════════
   SIDEBAR TOGGLE — Collapsed state
══════════════════════════════════════ */
#menu-panel.collapsed{
  width:var(--menu-collapsed-w);
}

/* header row with toggle btn */
.menu-header{
  padding:16px 12px 12px;
  border-bottom:1px solid var(--sep);
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  min-height:54px;
}
.menu-header h2{
  font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:600;
  letter-spacing:.45em;text-transform:uppercase;color:rgba(139,92,246,0.45);
  white-space:nowrap;overflow:hidden;
  transition:opacity var(--collapse-transition),max-width var(--collapse-transition);
  max-width:200px;opacity:1;
}
#menu-panel.collapsed .menu-header h2{
  max-width:0;opacity:0;pointer-events:none;
}

/* ══════════════════════════════════════
   SIDEBAR TOGGLE — Toggle Button
══════════════════════════════════════ */
#sidebar-toggle{
  width:28px;height:28px;flex-shrink:0;
  border-radius:6px;
  background:rgba(139,92,246,0.06);
  border:1px solid rgba(139,92,246,0.15);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  transition:background 180ms ease,border-color 180ms ease,box-shadow 180ms ease;
  color:rgba(139,92,246,0.55);
}
#sidebar-toggle:hover{
  background:rgba(139,92,246,0.14);
  border-color:rgba(139,92,246,0.35);
  box-shadow:0 0 10px rgba(139,92,246,0.12);
  color:rgba(139,92,246,0.9);
}
#sidebar-toggle svg{width:14px;height:14px;transition:transform var(--collapse-transition)}
#menu-panel.collapsed #sidebar-toggle svg{transform:rotate(180deg)}

/* scroll area */
.menu-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:6px 0 80px}
.menu-scroll::-webkit-scrollbar{width:2px}
.menu-scroll::-webkit-scrollbar-thumb{background:rgba(139,92,246,0.2);border-radius:2px}

/* ══════════════════════════════════════
   SIDEBAR UI — Category groups
══════════════════════════════════════ */
.cat-group{margin-bottom:2px}
.cat-header{
  display:flex;align-items:center;gap:9px;
  padding:11px 12px 9px;cursor:pointer;
  transition:background 180ms ease;
  position:relative;
}
.cat-header:hover{background:rgba(139,92,246,0.06)}
.cat-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;transition:box-shadow 300ms ease}
.cat-header.open .cat-dot,.cat-header:hover .cat-dot{box-shadow:0 0 8px currentColor}
.cat-title{
  font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;flex:1;
  transition:color 180ms ease,opacity var(--collapse-transition),max-width var(--collapse-transition);
  white-space:nowrap;overflow:hidden;max-width:180px;opacity:1;
}
#menu-panel.collapsed .cat-title{max-width:0;opacity:0}
.cat-arrow{
  width:13px;height:13px;opacity:.35;flex-shrink:0;
  transition:transform 280ms cubic-bezier(.34,1.56,.64,1),opacity var(--collapse-transition);
}
.cat-header.open .cat-arrow{transform:rotate(90deg);opacity:.65}
#menu-panel.collapsed .cat-arrow{opacity:0;pointer-events:none}

/* per-cat colors */
.cat-group[data-cat="ANALYS"] .cat-dot{background:var(--accent-cyan);color:var(--accent-cyan)}
.cat-group[data-cat="ANALYS"] .cat-title{color:var(--accent-cyan)}
.cat-group[data-cat="MONITORING"] .cat-dot{background:var(--accent-green);color:var(--accent-green)}
.cat-group[data-cat="MONITORING"] .cat-title{color:var(--accent-green)}
.cat-group[data-cat="QC"] .cat-dot{background:rgba(167,139,250,0.45);color:rgba(167,139,250,0.45)}
.cat-group[data-cat="QC"] .cat-title{color:rgba(167,139,250,0.45)}

/* collapsed: center the dot */
#menu-panel.collapsed .cat-header{justify-content:center;padding:11px 0 9px}
#menu-panel.collapsed .cat-dot{width:7px;height:7px}

/* ══════════════════════════════════════
   SIDEBAR UI — Sub items (expanded)
══════════════════════════════════════ */
.cat-items{overflow:hidden;max-height:0;transition:max-height 340ms cubic-bezier(.22,1,.36,1)}
.cat-items.open{max-height:400px}

/* collapsed: always show items, stacked */
#menu-panel.collapsed .cat-items{max-height:400px}

.menu-item{
  display:flex;align-items:center;gap:11px;
  padding:9px 12px 9px 26px;cursor:pointer;
  transition:background 160ms ease,border-left-color 200ms ease;
  border-left:2px solid transparent;
  position:relative;
}
.menu-item:hover{background:rgba(139,92,246,0.07)}
.menu-item.disabled{opacity:.32;cursor:default;pointer-events:none}

/* collapsed: center icon, hide text */
#menu-panel.collapsed .menu-item{
  justify-content:center;
  padding:10px 0;
  border-left-width:2px;
}
#menu-panel.collapsed .menu-item .item-label,
#menu-panel.collapsed .menu-item .item-arr,
#menu-panel.collapsed .menu-item .soon-pill{
  display:none;
}

/* ── Active state ── */
.menu-item.active{
  background:rgba(56,189,248,0.07);
  border-left-color:var(--accent-cyan);
}
.menu-item.active .item-label{color:var(--text-hi)}
.menu-item.active .item-icon{opacity:1;filter:drop-shadow(0 0 5px var(--accent-cyan))}
.menu-item.active .item-arr{opacity:1;transform:translateX(2px)}
.cat-group[data-cat="MONITORING"] .menu-item.active{background:rgba(52,211,153,0.07);border-left-color:var(--accent-green)}
.cat-group[data-cat="MONITORING"] .menu-item.active .item-icon{filter:drop-shadow(0 0 5px var(--accent-green))}
.cat-group[data-cat="QC"] .menu-item.active{background:rgba(167,139,250,0.07);border-left-color:var(--accent-purple)}
.cat-group[data-cat="QC"] .menu-item.active .item-icon{filter:drop-shadow(0 0 5px var(--accent-purple))}

/* collapsed active: stronger glow */
#menu-panel.collapsed .menu-item.active{
  background:rgba(56,189,248,0.1);
  border-left-color:var(--accent-cyan);
  box-shadow:inset 3px 0 10px rgba(56,189,248,0.08);
}
#menu-panel.collapsed .cat-group[data-cat="MONITORING"] .menu-item.active{
  background:rgba(52,211,153,0.1);
  border-left-color:var(--accent-green);
}
#menu-panel.collapsed .cat-group[data-cat="QC"] .menu-item.active{
  background:rgba(167,139,250,0.1);
  border-left-color:var(--accent-purple);
}

.item-icon{
  width:17px;height:17px;flex-shrink:0;opacity:.72;
  transition:opacity 160ms ease,filter 200ms ease;
}
.cat-group[data-cat="ANALYS"] .item-icon{color:var(--accent-cyan)}
.cat-group[data-cat="MONITORING"] .item-icon{color:var(--accent-green)}
.cat-group[data-cat="QC"] .item-icon{color:var(--accent-purple)}
.item-label{font-family:'Exo 2',sans-serif;font-size:11.5px;font-weight:400;color:var(--text-mid);letter-spacing:.03em;flex:1;line-height:1.3;transition:color 160ms ease;white-space:nowrap;overflow:hidden;}
.menu-item:hover .item-label{color:var(--text-hi)}
.item-arr{width:11px;height:11px;opacity:0;color:rgba(139,92,246,0.5);transition:opacity 160ms ease,transform 160ms ease;flex-shrink:0}
.menu-item:hover .item-arr{opacity:1;transform:translateX(2px)}
.soon-pill{font-family:'Rajdhani',sans-serif;font-size:8px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.2);color:rgba(139,92,246,0.5);padding:2px 7px;border-radius:10px;white-space:nowrap}

/* ══════════════════════════════════════
   SIDEBAR UI — Tooltip (collapsed hover)
══════════════════════════════════════ */
.menu-item{position:relative}
.item-tooltip{
  position:absolute;
  left:calc(100% + 10px);
  top:50%;transform:translateY(-50%);
  background:rgba(18,8,48,0.97);
  border:1px solid rgba(139,92,246,0.25);
  border-radius:7px;
  padding:6px 12px;
  white-space:nowrap;
  font-family:'Exo 2',sans-serif;font-size:11px;font-weight:400;
  color:var(--text-hi);letter-spacing:.03em;
  pointer-events:none;
  opacity:0;
  transition:opacity 180ms ease,transform 180ms ease;
  transform:translateY(-50%) translateX(-4px);
  z-index:100;
  box-shadow:0 4px 20px rgba(0,0,0,0.5),0 0 12px rgba(139,92,246,0.08);
}
.item-tooltip::before{
  content:'';
  position:absolute;right:100%;top:50%;transform:translateY(-50%);
  border:5px solid transparent;
  border-right-color:rgba(139,92,246,0.25);
}
#menu-panel.collapsed .menu-item:hover .item-tooltip{
  opacity:1;
  transform:translateY(-50%) translateX(0);
}

/* ══════════════════════════════════════
   UI — CONTENT AREA
══════════════════════════════════════ */
#content{flex:1;height:100%;position:relative;overflow:hidden;background:#07050f;display:flex;flex-direction:column;transition:flex var(--collapse-transition);}

#content-grad{
  position:absolute;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 65% 55% at 55% 42%,rgba(99,102,241,0.1) 0%,transparent 65%),
    radial-gradient(ellipse 45% 45% at 82% 78%,rgba(139,92,246,0.08) 0%,transparent 60%),
    radial-gradient(ellipse 40% 40% at 15% 20%,rgba(56,189,248,0.04) 0%,transparent 55%);
  opacity:0;transition:opacity 700ms ease;
}
#content-grad.on{opacity:1}

/* ══════════════════════════════════════
   UI — STAGE (closed home button)
══════════════════════════════════════ */
#stage{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding-bottom:18px;
  z-index:2;pointer-events:none;
}
#stage.hidden{display:none}

#center-wrap{
  display:flex;flex-direction:column;align-items:center;gap:18px;
  pointer-events:all;
  transition:opacity 320ms ease,transform 320ms cubic-bezier(.55,0,1,.45);
  animation:float 3.8s ease-in-out infinite;
}
#center-wrap.out{opacity:0;transform:scale(.82);pointer-events:none;animation:none;}

#orbit{
  position:relative;width:160px;height:160px;
  display:flex;align-items:center;justify-content:center;
}
.orbit-ring{
  position:absolute;border-radius:50%;
  border:1px solid rgba(56,189,248,0.09);
  animation:spin-slow 18s linear infinite;
}
.orbit-ring:nth-child(1){width:130px;height:130px;border-color:rgba(56,189,248,0.1);animation-duration:14s}
.orbit-ring:nth-child(2){width:155px;height:155px;border-color:rgba(139,92,246,0.07);animation-direction:reverse;animation-duration:22s}
.orbit-dot{
  position:absolute;width:4px;height:4px;border-radius:50%;background:var(--accent-cyan);
  top:50%;left:0;margin-top:-2px;
  box-shadow:0 0 6px var(--accent-cyan);
}
.orbit-ring:nth-child(2) .orbit-dot{background:var(--accent-purple);box-shadow:0 0 6px var(--accent-purple);left:auto;right:0}
@keyframes spin-slow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

#big-btn{
  width:72px;height:72px;border-radius:50%;
  background:radial-gradient(circle at 36% 30%,rgba(56,189,248,0.13) 0%,rgba(7,5,15,0.96) 65%);
  border:1.5px solid rgba(56,189,248,0.22);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  box-shadow:0 8px 32px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.05);
  transition:box-shadow 250ms ease,border-color 250ms ease,transform 140ms ease,background 250ms ease;
  position:relative;z-index:2;
}
#big-btn:hover{
  border-color:rgba(56,189,248,0.45);
  box-shadow:0 0 20px rgba(56,189,248,0.18),0 8px 32px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.06);
}
#big-btn.pressed{
  transform:scale(0.87)!important;
  border-color:rgba(56,189,248,0.75);
  box-shadow:0 0 0 3px rgba(56,189,248,0.4),0 0 38px rgba(56,189,248,0.38),inset 0 1px 0 rgba(255,255,255,0.1);
  background:radial-gradient(circle at 36% 30%,rgba(56,189,248,0.28) 0%,rgba(7,5,15,0.92) 65%);
}
#big-icon{width:32px;height:32px}
.big-label{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:500;letter-spacing:.38em;text-transform:uppercase;color:rgba(255,255,255,0.18)}
.glow-svg{position:absolute;width:90px;height:90px;pointer-events:none;z-index:1;animation:spin-slow 8s linear infinite}

/* ══════════════════════════════════════
   UI — CONTENT HINT
══════════════════════════════════════ */
#hint{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;
  pointer-events:none;z-index:2;
  opacity:0;transition:opacity 450ms ease;
}
#hint.on{opacity:1}
.hint-svg{width:40px;height:40px;color:rgba(99,102,241,0.18)}
.hint-txt{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:500;letter-spacing:.25em;text-transform:uppercase;color:rgba(255,255,255,0.1)}

/* ══════════════════════════════════════
   UI — BREADCRUMB
══════════════════════════════════════ */
#breadcrumb-bar{
  position:relative;z-index:10;
  display:none;
  align-items:center;gap:6px;
  padding:8px 18px;
  background:rgba(7,5,15,0.85);
  border-bottom:1px solid rgba(139,92,246,0.1);
  backdrop-filter:blur(8px);
  flex-shrink:0;
}
#breadcrumb-bar.visible{display:flex}
.bc-item{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,0.28)}
.bc-item.active{color:var(--accent-cyan)}
.bc-sep{font-size:9px;color:rgba(255,255,255,0.15)}
.bc-home-icon{width:10px;height:10px;color:rgba(255,255,255,0.28);display:inline-block;vertical-align:middle;margin-right:2px}

/* ══════════════════════════════════════
   CONTENT LOADER — FRAME WRAPPER
══════════════════════════════════════ */
#frame-wrap{flex:1;position:relative;overflow:hidden;display:none}
#frame-wrap.visible{display:block}

#content-frame{
  width:100%;height:100%;border:none;
  opacity:0;transform:scale(0.985);
  transition:opacity 380ms ease,transform 380ms cubic-bezier(.22,1,.36,1);
  background:#fff;
}
#content-frame.loaded{opacity:1;transform:scale(1)}

/* ══════════════════════════════════════
   CONTENT LOADER — LOADING OVERLAY
══════════════════════════════════════ */
#loading-overlay{
  position:absolute;inset:0;z-index:50;
  background:radial-gradient(ellipse 80% 80% at 50% 40%,rgba(15,8,35,0.97) 0%,rgba(7,5,15,0.99) 70%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;
  opacity:0;pointer-events:none;
  transition:opacity 220ms ease;
}
#loading-overlay.visible{opacity:1;pointer-events:all}
#loading-overlay.hiding{opacity:0}

.fu-spinner{position:relative;width:56px;height:56px}
.fu-ring{position:absolute;inset:0;border-radius:50%;border:1.5px solid transparent}
.fu-ring:nth-child(1){border-top-color:var(--accent-cyan);border-right-color:rgba(56,189,248,0.15);animation:spin-cw 1.1s linear infinite}
.fu-ring:nth-child(2){inset:8px;border-bottom-color:var(--accent-purple);border-left-color:rgba(139,92,246,0.15);animation:spin-ccw 0.75s linear infinite}
.fu-ring:nth-child(3){inset:16px;border-top-color:rgba(99,102,241,0.7);border-right-color:transparent;animation:spin-cw 0.55s linear infinite}
.fu-core{position:absolute;inset:22px;border-radius:50%;background:radial-gradient(circle,rgba(56,189,248,0.25) 0%,transparent 70%);animation:fu-pulse 1.4s ease-in-out infinite}
@keyframes spin-cw{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes spin-ccw{from{transform:rotate(0)}to{transform:rotate(-360deg)}}
@keyframes fu-pulse{0%,100%{opacity:0.4;transform:scale(0.85)}50%{opacity:1;transform:scale(1.1)}}

.loading-text-wrap{display:flex;flex-direction:column;align-items:center;gap:6px}
.loading-label{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;letter-spacing:.45em;text-transform:uppercase;color:rgba(56,189,248,0.7);animation:blink-label 1.8s ease-in-out infinite}
.loading-module{font-family:'Exo 2',sans-serif;font-size:10px;font-weight:300;letter-spacing:.12em;color:rgba(255,255,255,0.22)}
.loading-bar-track{width:120px;height:1px;background:rgba(255,255,255,0.06);border-radius:1px;overflow:hidden}
.loading-bar-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent-purple),var(--accent-cyan));border-radius:1px;animation:load-sweep 1.6s ease-in-out infinite}
@keyframes blink-label{0%,100%{opacity:.7}50%{opacity:1}}
@keyframes load-sweep{0%{width:0%;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0%;margin-left:100%}}

/* ══════════════════════════════════════
   CONTENT LOADER — BLOCKED CARD
══════════════════════════════════════ */
#blocked-card{
  position:absolute;inset:0;z-index:45;
  display:none;align-items:center;justify-content:center;
  background:radial-gradient(ellipse 70% 60% at 50% 45%,rgba(15,8,35,0.96) 0%,rgba(7,5,15,0.99) 70%);
  animation:fadein 300ms ease;
}
#blocked-card.visible{display:flex}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.blocked-inner{display:flex;flex-direction:column;align-items:center;gap:18px;padding:36px 32px;background:rgba(255,255,255,0.025);border:1px solid rgba(139,92,246,0.15);border-radius:18px;max-width:340px;text-align:center;box-shadow:0 0 60px rgba(88,28,220,0.1)}
.blocked-icon{width:48px;height:48px;background:radial-gradient(circle,rgba(99,102,241,0.15) 0%,transparent 70%);border:1px solid rgba(99,102,241,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center}
.blocked-icon svg{width:22px;height:22px;color:rgba(99,102,241,0.6)}
.blocked-title{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,0.7)}
.blocked-desc{font-family:'Exo 2',sans-serif;font-size:11px;font-weight:300;color:rgba(255,255,255,0.28);line-height:1.6;letter-spacing:.03em}
.blocked-btn{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:600;letter-spacing:.3em;text-transform:uppercase;padding:10px 24px;border-radius:8px;cursor:pointer;background:transparent;border:1px solid rgba(56,189,248,0.3);color:rgba(56,189,248,0.8);transition:background 200ms ease,border-color 200ms ease,box-shadow 200ms ease}
.blocked-btn:hover{background:rgba(56,189,248,0.07);border-color:rgba(56,189,248,0.6);box-shadow:0 0 18px rgba(56,189,248,0.12)}

/* ══════════════════════════════════════
   RESPONSIVE BEHAVIOR — Mobile overlay
══════════════════════════════════════ */
#mobile-overlay{
  display:none;position:fixed;inset:0;z-index:18;
  background:rgba(7,5,15,0.6);
  backdrop-filter:blur(2px);
  opacity:0;transition:opacity 280ms ease;
}
#mobile-overlay.visible{opacity:1}

/* ══════════════════════════════════════
   UI — FOOTER
══════════════════════════════════════ */
#footer{position:fixed;bottom:18px;left:0;right:0;text-align:center;z-index:30;pointer-events:none}
#footer span{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:400;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,0.18)}
#footer a{color:rgba(56,189,248,0.32);text-decoration:none;letter-spacing:.08em;transition:color 200ms ease;pointer-events:all}
#footer a:hover{color:var(--accent-cyan)}

/* ══════════════════════════════════════
   RESPONSIVE BEHAVIOR — Breakpoints
══════════════════════════════════════ */
@media(max-width:768px){
  #menu-panel{
    position:fixed;left:var(--sb-w);top:0;bottom:0;z-index:25;
    transform:translateX(-100%);
    transition:transform var(--collapse-transition),width var(--collapse-transition);
    width:var(--menu-w) !important;
  }
  #menu-panel.visible{transform:translateX(0)}
  #menu-panel.collapsed{width:var(--menu-w) !important;transform:translateX(-100%)}
  #mobile-overlay{display:block}
  #mobile-overlay.visible{pointer-events:all}
}

@media(max-width:480px){
  :root{--menu-w:210px}
  #orbit{width:130px;height:130px}
  .orbit-ring:nth-child(1){width:105px;height:105px}
  .orbit-ring:nth-child(2){width:126px;height:126px}
  #big-btn{width:60px;height:60px}
  #big-icon{width:26px;height:26px}
  .blocked-inner{padding:28px 20px;max-width:90%}
}
</style>
</head>

<div id="mobile-overlay"></div>

<div id="shell">

<script>
(function(){
'use strict';

/* ══════════════════════════════════════
   NAVIGATION — Menu Data
══════════════════════════════════════ */
const MENU = [
  { 
    cat: 'ANALYS', 
    label: 'Analisa', 
    items: [
      {
        id: 'produktivitas', label: 'Analisa Produktivitas', url: 'https://mulyadhialawihisyam-design.github.io/bobotpacker/',
        icon: `<svg viewBox="0 0 17 17" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="15" y1="16" x2="15" y2="8"/><line x1="9" y1="16" x2="9" y2="3"/><line x1="3" y1="16" x2="3" y2="11"/><line x1="1" y1="16" x2="16" y2="16"/></svg>`
      },
      {
        id: 'complain', label: 'Analisa Complain', url: 'https://mulyadhialawihisyam-design.github.io/dashboard-complain/',
        icon: `<svg viewBox="0 0 17 17" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="8.5" cy="8.5" r="7"/><line x1="8.5" y1="5.5" x2="8.5" y2="8.5"/><circle cx="8.5" cy="11.5" r=".5" fill="currentColor"/></svg>`
      },
      {
        id: 'checkpoint', label: 'Analisa Checkpoint', url: 'https://mulyadhialawihisyam-design.github.io/analisa_invoicedroping/',
        icon: `<svg viewBox="0 0 17 17" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 8.5 12 8.5 10 14 7 3 5 8.5 1 8.5"/></svg>`
      },
      {
        id: 'prioritas', 
        label: 'Analisa Prioritas', 
        url: 'https://script.google.com/macros/s/AKfycbybz0XFEkKoS0oJFOsU-bckmkyBV6baavModRLe8q_CSVpUvDl1j9Nhj6IEL_6rkvLH/exec',
        icon: `<svg viewBox="0 0 17 17" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 3.5h12M2.5 7.5h12M2.5 11.5h6"/><circle cx="13" cy="12" r="2"/><path d="M13 11v1"/><path d="M13 13.5h.01"/></svg>`
      }
    ]
  },
  { 
    cat: 'MONITORING', 
    label: 'Monitoring', 
    items: [
      {
        id: 'asset',
        label: 'Asset',
        url: 'https://mulyadhialawihisyam-design.github.io/cuttermonitoring/',
        icon: `<svg viewBox="0 0 17 17" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="2" width="15" height="10" rx="1.5"/><path d="M5 15h7M8.5 12v3"/><circle cx="8.5" cy="7" r="2.2"/></svg>`
      },
      {
        id: 'kpi-karyawan',
        label: 'KPI Karyawan',
        url: 'https://mulyadhialawihisyam-design.github.io/new-productivity/',
        icon: `<svg viewBox="0 0 17 17" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 15h13M2 12l4-4 3.5 3.5L14 4M10 4h4v4"/></svg>`
      }
    ]
  },
  { 
    cat: 'OTHERS', 
    label: 'Lain-Lain', 
    items: [
      {
        id: 'ploting-express', 
        label: 'Ploting Express', 
        url: 'https://script.google.com/macros/s/AKfycbz1O0CiSlsaOPcGlhIcSEnZH5b6js7ENOYBbABUl9Sx9ZVHwBM0zRI1uX2aZSYD0W6uEg/exec',
        icon: `<svg viewBox="0 0 17 17" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11.5 3.5h-6a1.5 1.5 0 0 0-1.5 1.5v8a1.5 1.5 0 0 0 1.5 1.5h6a1.5 1.5 0 0 0 1.5-1.5v-8a1.5 1.5 0 0 0-1.5-1.5z"/><path d="M7 2h3v1.5H7zM6 8.5l2 2 3.5-3.5"/></svg>`
      },
    ]
  },
];
/* ══════════════════════════════════════
   UI — Element Refs
══════════════════════════════════════ */
const sidebar        = document.getElementById('sidebar');
const menuPanel      = document.getElementById('menu-panel');
const menuScroll     = document.getElementById('menu-scroll');
const homeBtn        = document.getElementById('home-btn');
const bigBtn         = document.getElementById('big-btn');
const centerWrap     = document.getElementById('center-wrap');
const contentGrad    = document.getElementById('content-grad');
const hint           = document.getElementById('hint');
const breadcrumbBar  = document.getElementById('breadcrumb-bar');
const bcCat          = document.getElementById('bc-cat');
const bcPage         = document.getElementById('bc-page');
const bcSep1         = document.getElementById('bc-sep1');
const bcSep2         = document.getElementById('bc-sep2');
const frameWrap      = document.getElementById('frame-wrap');
const iframe         = document.getElementById('content-frame');
const loadingOvl     = document.getElementById('loading-overlay');
const loadingName    = document.getElementById('loading-module-name');
const blockedCard    = document.getElementById('blocked-card');
const blockedBtn     = document.getElementById('blocked-open-btn');
const stage          = document.getElementById('stage');
const sidebarToggle  = document.getElementById('sidebar-toggle');
const mobileOverlay  = document.getElementById('mobile-overlay');

/* ══════════════════════════════════════
   UI — State
══════════════════════════════════════ */
let isOpen       = false;
let busy         = false;
let activeRow    = null;
let currentUrl   = '';
let loadTimer    = null;
let blockedUrl   = '';

/* ══════════════════════════════════════
   LOCAL STORAGE — Sidebar State
══════════════════════════════════════ */
const LS_KEY = 'muly_sidebarState';

function saveSidebarState(collapsed){
  try{ localStorage.setItem(LS_KEY, collapsed ? 'collapsed' : 'expanded'); }catch(e){}
}
function loadSidebarState(){
  try{ return localStorage.getItem(LS_KEY); }catch(e){ return null; }
}

/* ══════════════════════════════════════
   RESPONSIVE BEHAVIOR — Mobile detect
══════════════════════════════════════ */
function isMobile(){ return window.innerWidth <= 768; }

/* ══════════════════════════════════════
   SIDEBAR TOGGLE — Apply collapsed state
══════════════════════════════════════ */
function applySidebarCollapse(collapsed, save){
  if(isMobile()){
    /* mobile: overlay behavior, never true collapse */
    menuPanel.classList.remove('collapsed');
    if(save) return;
    return;
  }
  if(collapsed){
    menuPanel.classList.add('collapsed');
  } else {
    menuPanel.classList.remove('collapsed');
  }
  if(save !== false) saveSidebarState(collapsed);
}

function isSidebarCollapsed(){
  return menuPanel.classList.contains('collapsed');
}

/* ══════════════════════════════════════
   SIDEBAR TOGGLE — Toggle handler
══════════════════════════════════════ */
function toggleSidebar(){
  if(isMobile()){
    /* on mobile: toggle visibility as overlay */
    if(menuPanel.classList.contains('visible')){
      menuPanel.classList.remove('visible');
      mobileOverlay.classList.remove('visible');
    } else {
      menuPanel.classList.add('visible');
      mobileOverlay.classList.add('visible');
    }
    return;
  }
  const nowCollapsed = !isSidebarCollapsed();
  applySidebarCollapse(nowCollapsed, true);
}

sidebarToggle.addEventListener('click', toggleSidebar);
sidebarToggle.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); toggleSidebar(); }});

/* mobile overlay click closes menu */
mobileOverlay.addEventListener('click', ()=>{
  menuPanel.classList.remove('visible');
  mobileOverlay.classList.remove('visible');
});

/* ══════════════════════════════════════
   RESPONSIVE BEHAVIOR — Resize listener
══════════════════════════════════════ */
window.addEventListener('resize', ()=>{
  if(isMobile()){
    menuPanel.classList.remove('collapsed');
    mobileOverlay.classList.remove('visible');
  } else {
    mobileOverlay.classList.remove('visible');
    /* restore saved state */
    const saved = loadSidebarState();
    applySidebarCollapse(saved === 'collapsed', false);
  }
});

/* ══════════════════════════════════════
   NAVIGATION — Build Menu
══════════════════════════════════════ */
MENU.forEach(group=>{
  const g = document.createElement('div');
  g.className = 'cat-group';
  g.dataset.cat = group.cat;

  const hdr = document.createElement('div');
  hdr.className = 'cat-header';
  hdr.innerHTML = `<div class="cat-dot"></div><span class="cat-title">${group.label}</span>
    <svg class="cat-arrow" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true"><polyline points="4.5 2 9.5 6.5 4.5 11"/></svg>`;

  const items = document.createElement('div');
  items.className = 'cat-items';

  if(group.items.length === 1){ hdr.classList.add('open'); items.classList.add('open'); }

  group.items.forEach(item=>{
    const row = document.createElement('div');
    row.className = 'menu-item' + (item.disabled ? ' disabled' : '');
    row.dataset.id = item.id;
    row.innerHTML = `<div class="item-icon">${item.icon}</div>
      <span class="item-label">${item.label}</span>
      ${item.disabled
        ? '<span class="soon-pill">Segera</span>'
        : `<svg class="item-arr" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="3.5 2 8.5 5.5 3.5 9"/></svg>`}
      <span class="item-tooltip">${item.label}</span>`;

    if(!item.disabled){
      row.addEventListener('click', ()=>{
        setActiveRow(row);
        updateBreadcrumb(group.label, item.label);
        loadPage(item.url, item.label);
        /* mobile: close panel after selection */
        if(isMobile()){
          menuPanel.classList.remove('visible');
          mobileOverlay.classList.remove('visible');
        }
      });
    }
    items.appendChild(row);
  });

  hdr.addEventListener('click', ()=>{
    if(isSidebarCollapsed()) return; /* collapsed: cat header acts as category label only */
    const opening = !items.classList.contains('open');
    menuScroll.querySelectorAll('.cat-items.open').forEach(el=>{
      el.classList.remove('open');
      el.closest('.cat-group').querySelector('.cat-header').classList.remove('open');
    });
    if(opening){ items.classList.add('open'); hdr.classList.add('open'); }
  });

  g.appendChild(hdr);
  g.appendChild(items);
  menuScroll.appendChild(g);
});

/* ══════════════════════════════════════
   NAVIGATION — Active Row
══════════════════════════════════════ */
function setActiveRow(row){
  if(activeRow) activeRow.classList.remove('active');
  activeRow = row;
  row.classList.add('active');
}

/* ══════════════════════════════════════
   NAVIGATION — Breadcrumb Update
══════════════════════════════════════ */
function updateBreadcrumb(catLabel, pageLabel){
  bcCat.textContent  = catLabel;
  bcPage.textContent = pageLabel;
  bcSep1.style.display = '';
  bcSep2.style.display = '';
  breadcrumbBar.classList.add('visible');
}

/* ══════════════════════════════════════
   CONTENT LOADER — loadPage
══════════════════════════════════════ */
function loadPage(url, label){
  currentUrl = url;
  blockedUrl = url;

  hint.classList.remove('on');
  frameWrap.classList.add('visible');
  stage.classList.add('hidden');

  iframe.classList.remove('loaded');
  blockedCard.classList.remove('visible');

  loadingName.textContent = label || '';
  loadingOvl.classList.remove('hiding');
  loadingOvl.classList.add('visible');

  if(loadTimer) clearTimeout(loadTimer);

  iframe.src = '';
  setTimeout(()=>{ iframe.src = url; }, 30);
  loadTimer = setTimeout(()=>{ handleBlocked(); }, 8000);
}

/* ══════════════════════════════════════
   CONTENT LOADER — iframe handlers
══════════════════════════════════════ */
iframe.addEventListener('load', ()=>{
  clearTimeout(loadTimer);
  try{
    const doc = iframe.contentDocument;
    if(doc && doc.location && (doc.location.href === 'about:blank' || doc.location.href === '')){
      return;
    }
  } catch(e){}
  revealFrame();
});

iframe.addEventListener('error', ()=>{
  clearTimeout(loadTimer);
  handleBlocked();
});

function revealFrame(){
  loadingOvl.classList.add('hiding');
  setTimeout(()=>{
    loadingOvl.classList.remove('visible');
    loadingOvl.classList.remove('hiding');
    iframe.classList.add('loaded');
  }, 220);
}

function handleBlocked(){
  loadingOvl.classList.remove('visible');
  iframe.classList.remove('loaded');
  blockedCard.classList.add('visible');
}

blockedBtn.addEventListener('click', ()=>{
  if(blockedUrl && blockedUrl !== '#'){
    window.open(blockedUrl, '_blank', 'noopener,noreferrer');
  }
});

/* ══════════════════════════════════════
   EVENT HANDLERS — Portal Open/Close
══════════════════════════════════════ */
function openPortal(){
  if(isOpen || busy) return;
  busy = true;
  bigBtn.classList.add('pressed');

  setTimeout(()=>{
    bigBtn.classList.remove('pressed');
    centerWrap.classList.add('out');

    setTimeout(()=>{
      sidebar.classList.add('visible');
      contentGrad.classList.add('on');
      homeBtn.classList.add('lit');

      if(isMobile()){
        /* mobile: show menu as overlay */
        menuPanel.classList.add('visible');
        mobileOverlay.classList.add('visible');
      } else {
        menuPanel.classList.add('visible');
        /* restore collapsed state from localStorage */
        const saved = loadSidebarState();
        applySidebarCollapse(saved === 'collapsed', false);
      }

      if(!frameWrap.classList.contains('visible')){
        setTimeout(()=>{ hint.classList.add('on'); }, 620);
      }

      isOpen = true;
      busy   = false;
    }, 280);
  }, 165);
}

function closePortal(){
  if(!isOpen || busy) return;
  busy = true;
  homeBtn.classList.add('pressed');
  setTimeout(()=> homeBtn.classList.remove('pressed'), 160);

  hint.classList.remove('on');
  menuPanel.classList.remove('visible');
  mobileOverlay.classList.remove('visible');

  setTimeout(()=>{
    sidebar.classList.remove('visible');
    homeBtn.classList.remove('lit');
    contentGrad.classList.remove('on');

    setTimeout(()=>{
      if(!frameWrap.classList.contains('visible')){
        centerWrap.classList.remove('out');
      }
      isOpen = false;
      busy   = false;
    }, 300);
  }, 90);
}

bigBtn.addEventListener('click', openPortal);
bigBtn.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); openPortal(); }});
homeBtn.addEventListener('click', closePortal);
homeBtn.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); closePortal(); }});

/* ══════════════════════════════════════
   LOCAL STORAGE — Init on load
   (state only applied once portal opens)
══════════════════════════════════════ */
/* Pre-load: nothing to apply yet — state applied in openPortal() */

})();
